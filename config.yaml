# Configuration file for Customer Segmentation Project

data:
  raw_path: "data/raw/"
  processed_path: "data/processed/"
  n_samples: 500
  random_state: 42

clustering:
  algorithms:
    kmeans:
      n_clusters: 5
      random_state: 42
      n_init: 10
    dbscan:
      eps: 0.5
      min_samples: 5
    gmm:
      n_components: 5
      random_state: 42
    hierarchical:
      n_clusters: 5
      linkage: "ward"

features:
  rfm:
    - recency
    - frequency
    - monetary
  engineered:
    - recency_frequency_ratio
    - monetary_per_purchase
    - days_since_last_purchase

visualization:
  cluster_colors:
    - "#3B82F6"  # blue
    - "#10B981"  # emerald
    - "#F59E0B"  # amber
    - "#F43F5E"  # rose
    - "#8B5CF6"  # violet
  plot_height: 600
  plot_width: 800

evaluation:
  metrics:
    - silhouette
    - davies_bouldin
    - calinski_harabasz
  cross_validation_folds: 5

logging:
  level: "INFO"
  file: "logs/app.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

dashboard:
  host: "0.0.0.0"
  port: 5000
  debug: true
  refresh_interval: 300  # seconds